name: Deploy WAR to Server

on:
  # Trigger manual saja - perlu approval
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Ketik "DEPLOY" untuk konfirmasi deployment ke production'
        required: true
        type: string

jobs:
  # Job 1: Build WAR
  build:
    name: Build WAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        run: mvn test -B

      - name: Build WAR
        run: mvn clean package -B -DskipTests

      - name: Upload WAR for Deploy
        uses: actions/upload-artifact@v4
        with:
          name: deploy-war
          path: target/*.war
          retention-days: 1

  # Job 2: Deploy ke Server (perlu approval via environment)
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build
    environment: production  # <-- Memerlukan approval reviewer

    # Validasi input manual
    if: github.event.inputs.confirm_deploy == 'DEPLOY'

    steps:
      - name: Validate Deployment Confirmation
        run: |
          echo "✅ Deployment confirmed by: ${{ github.actor }}"
          echo "🚀 Deploying to production server..."

      - name: Download WAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-war
          path: ./artifact

      - name: List WAR File
        run: ls -lh ./artifact/*.war

      - name: Deploy WAR to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 3.229.68.221
          username: ubuntu
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "./artifact/*.war"
          target: "/opt/tomcat9/webapps"
          strip_components: 1

      - name: Restart Tomcat & Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.229.68.221
          username: ubuntu
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "==============================="
            echo "  Deployment & Restart"
            echo "==============================="
            echo ""
            echo "WAR file deployed:"
            ls -lh /opt/tomcat9/webapps/*.war
            echo ""
            echo "Restarting Tomcat..."
            sudo systemctl restart tomcat9
            sleep 5
            echo ""
            echo "Tomcat status:"
            sudo systemctl is-active tomcat9
            echo ""
            echo "Testing app endpoint:"
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:8080/java-webapp-ci/
            echo ""
            echo ""
            echo "Server info:"
            echo "  Host: $(hostname)"
            echo "  Date: $(date)"
            echo "  User: $(whoami)"
            echo ""
            echo "✅ WAR successfully deployed to Tomcat!"
