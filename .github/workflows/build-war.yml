name: Java 8 CI - Build WAR

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Bisa trigger manual dari GitHub UI

jobs:
  build:
    name: Build & Test WAR
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup JDK 8
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      # Step 3: Run unit tests
      - name: Run Tests
        run: mvn test -B

      # Step 4: Build WAR package
      - name: Build WAR
        run: mvn clean package -B -DskipTests

      # Step 5: Verify WAR file
      - name: Verify WAR File
        run: |
          echo "==============================="
          echo "  WAR Build Successful!"
          echo "==============================="
          echo ""
          echo "File:"
          ls -lh target/*.war
          echo ""
          echo "WAR Contents (top 20):"
          jar -tf target/*.war | head -20

      # Step 6: Upload WAR as artifact
      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-webapp-ci-war
          path: target/*.war
          retention-days: 30
